name: lint

on:
  pull_request:
    branches:
      - "*"
  # make workflow "callable" by others
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Setup python
        run: uv python install

      - name: pip install
        run: uv install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: lint using ruff
        run: uv run ruff check --output-format github ./src ./tests

      - name: format check using ruff
        # We could also use the official GitHub Actions integration.
        # https://beta.ruff.rs/docs/usage/#github-action
        # uses: chartboost/ruff-action@v1
        run: |
          uv run ruff format --check ./src ./tests

  test:
    runs-on: ubuntu-latest

    steps:
      - name: set timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Berlin"

      - name: checkout
        uses: actions/checkout@v6

      - name: Setup python
        run: uv python install

      - name: pip install
        run: uv install

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: run pytest
        run: uv run pytest tests
