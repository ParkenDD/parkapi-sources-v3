# GitHub Actions workflow to build, test and publish Python packages to PyPI everytime a new release is created.

name: Publish release

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          # We use Python 3.12 here because it's the minimum Python version supported by this library.
          python-version: '3.12'
          enable-cache: true

      - name: Set package version from release tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: uv version --no-sync "${TAG#v}"

      - name: Build package
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist_packages
          path: dist/

  test:
    # This job tests the built package by installing it via uv and running unit tests.
    name: Test package
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set timezone to Europe/Berlin
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Europe/Berlin"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist_packages
          path: dist/

      - name: Install dev dependencies (without the project itself)
        run: uv sync --locked --no-install-project

      - name: Install built package
        run: uv pip install --no-deps dist/parkapi_sources-*.whl

      - name: Run unit tests
        run: uv run --no-sync pytest

  publish:
    name: Publish package
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist_packages
          path: dist/

      - name: Upload package to GitHub release assets
        uses: AButler/upload-release-assets@v4.0.0
        with:
          files: dist/*
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish package to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
